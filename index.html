<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터 학습 통합 플랫폼</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Pretendard", "맑은 고딕", sans-serif;
}

body{
    display:flex;
    height:100vh;
    overflow:hidden;
    background:#f4f7fb;
}

/* 왼쪽 패널 (20%) */
.sidebar{
    width:20%;
    background:linear-gradient(180deg,#0f172a,#1e293b);
    color:white;
    overflow-y:auto;
    padding:20px;
    box-shadow:4px 0px 20px rgba(0,0,0,0.2);
}

.sidebar h1{
    text-align:center;
    font-size:24px;
    margin-bottom:25px;
    color:#38bdf8;
}

.section-title{
    margin-top:20px;
    margin-bottom:10px;
    font-size:14px;
    color:#cbd5e1;
    border-left:4px solid #38bdf8;
    padding-left:8px;
}

.menu-btn{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:none;
    border-radius:12px;
    background:white;
    color:#1e293b;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.menu-btn:hover{
    background:#38bdf8;
    color:white;
    transform:translateX(5px);
}

/* 오른쪽 패널 (80%) */
.content{
    width:80%;
    background:white;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

/* 스크롤 예쁘게 */
.sidebar::-webkit-scrollbar{
    width:8px;
}
.sidebar::-webkit-scrollbar-thumb{
    background:#38bdf8;
    border-radius:10px;
}
</style>
</head>
<body>

<!-- 왼쪽 메뉴 -->
<div class="sidebar">
    <h1>📘 DATA Science</h1>

    <button class="menu-btn" onclick="loadPage('d100a.html')">데이터 과학 개념정리</button>
    <button class="menu-btn" onclick="loadPage('d111a.html')">데이터 과학과 진로</button>
    <button class="menu-btn" onclick="loadPage('d112a.html')">데이터의 의미</button>
    <button class="menu-btn" onclick="loadPage('d113a.html')">데이터의 보안</button>

    <button class="menu-btn" onclick="loadPage('d121a.html')">통합개발환경</button>
    <button class="menu-btn" onclick="loadPage('d122a.html')">파이썬 기초</button>
    <button class="menu-btn" onclick="loadPage('d123a.html')">데이터 분석</button>
    <button class="menu-btn" onclick="loadPage('d124a.html')">데이터 시각화</button>

    <button class="menu-btn" onclick="loadPage('d211a.html')">데이터를 대표하는 값</button>
    <button class="menu-btn" onclick="loadPage('d212a.html')">데이터의 흩어짐 측정</button>
    <button class="menu-btn" onclick="loadPage('d221a.html')">데이터 분석과 예측</button>
    <button class="menu-btn" onclick="loadPage('d222a.html')">상관 관계</button>
    <button class="menu-btn" onclick="loadPage('d223a.html')">회귀분석</button>

    <button class="menu-btn" onclick="loadPage('d231a.html')">모델 평가</button>
    <button class="menu-btn" onclick="loadPage('d232a.html')">평가 방법 이해 적용하기</button>
</div>

<!-- 오른쪽 콘텐츠 -->
<div class="content">
    <iframe id="viewer" src="d100a.html"></iframe>
</div>

<script>
function loadPage(page){
    document.getElementById("viewer").src = page;
}
</script>

</body>
</html>
